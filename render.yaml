services:
  - type: web
    name: eric-store
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/data/dev.db
      - key: UPLOAD_ROOT
        value: /data/uploads
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: UPLOAD_TOKEN
        sync: false
